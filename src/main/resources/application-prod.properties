spring.application.name=Flight_Management_System

# ---- Production Database (MySQL) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flight_management}
spring.datasource.username=${DB_USERNAME:flight_user}
spring.datasource.password=${DB_PASSWORD:flight_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---- Production JPA/Flyway ----
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- Production Observability ----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# ---- Logging ----
logging.structured.format.console=logstash

# ---- Auth / JWT ----
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.security.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI}
app.security.refresh.expiration-ms=${REFRESH_TOKEN_EXPIRATION_MS:2592000000}
app.security.refresh.cookie-name=${REFRESH_COOKIE_NAME:airport_refresh_token}
app.security.refresh.cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.security.refresh.cookie-same-site=${REFRESH_COOKIE_SAME_SITE:None}

# ---- Google OAuth2 ----
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
