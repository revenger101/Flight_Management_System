spring.application.name=Flight_Management_System
spring.profiles.active=dev

# ---- H2 Database Configuration ----
spring.datasource.url=jdbc:h2:mem:airplaine
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ---- H2 Console (accessible at /h2-console) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# ---- Data Initialization ----
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
app.seed.demo.enabled=true

# ---- Observability / Actuator ----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# ---- Structured Logging ----
logging.structured.format.console=logstash

# ---- API Docs ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ---- Flyway ----
spring.flyway.enabled=false

# ---- Auth / JWT ----
app.security.jwt.secret=change-this-to-a-very-long-random-secret-key-32-chars-min
app.security.jwt.expiration-ms=86400000
app.security.oauth2.success-redirect-uri=http://localhost:5173/oauth2/success
app.security.refresh.expiration-ms=2592000000
app.security.refresh.cookie-name=airport_refresh_token
app.security.refresh.cookie-secure=false
app.security.refresh.cookie-same-site=Lax